<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#1B2D5B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Bates Electric — Document Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Exo 2', sans-serif;
      background: #F5F7FA;
    }
    .viewer-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: #1B2D5B;
      color: #FFFFFF;
    }
    .viewer-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .viewer-back:active {
      background: rgba(255,255,255,0.25);
    }
    .viewer-back svg {
      pointer-events: none;
    }
    .viewer-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Desktop: show PDF in iframe */
    .viewer-frame {
      width: 100%;
      height: calc(100% - 52px - max(0px, env(safe-area-inset-top)));
      border: none;
      background: #FFFFFF;
    }

    /* Mobile: show open-in-browser prompt */
    .viewer-mobile {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px;
      text-align: center;
      height: calc(100% - 52px);
    }
    .viewer-mobile-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(27,45,91,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1B2D5B;
    }
    .viewer-mobile-heading {
      font-size: 20px;
      font-weight: 700;
      color: #1B2D5B;
    }
    .viewer-mobile-page {
      font-size: 15px;
      color: #5A6577;
      margin-top: -12px;
    }
    .viewer-mobile-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 320px;
      padding: 16px 24px;
      background: #1B2D5B;
      color: #FFFFFF;
      border: none;
      border-radius: 14px;
      font-family: 'Exo 2', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(27,45,91,0.25);
    }
    .viewer-mobile-btn:active {
      transform: scale(0.98);
      box-shadow: 0 1px 4px rgba(27,45,91,0.20);
    }
    .viewer-mobile-btn svg {
      pointer-events: none;
    }
    .viewer-mobile-hint {
      font-size: 13px;
      color: #8C939A;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="viewer-bar">
    <button class="viewer-back" id="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </button>
    <span class="viewer-title" id="viewer-title">Document</span>
  </div>

  <!-- Desktop: iframe -->
  <iframe class="viewer-frame" id="pdf-frame"></iframe>

  <!-- Mobile: open-in-browser prompt -->
  <div class="viewer-mobile" id="mobile-prompt">
    <div class="viewer-mobile-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
    </div>
    <div class="viewer-mobile-heading" id="mobile-heading"></div>
    <div class="viewer-mobile-page" id="mobile-page"></div>
    <button class="viewer-mobile-btn" id="open-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open Document
    </button>
    <div class="viewer-mobile-hint">Opens in your browser. Use the Back button above when done.</div>
  </div>

  <script>
    var params = new URLSearchParams(location.search);
    var file = params.get('file') || '';
    var page = params.get('page') || '';
    var title = params.get('title') || 'Document';
    var back = params.get('back') || '';

    // Set header title
    document.getElementById('viewer-title').textContent = title;

    // Build PDF URL with page anchor
    var pdfUrl = file + (page ? '#page=' + page : '');

    // Back button
    var backBtn = document.getElementById('back-btn');
    function goBack() {
      if (back) {
        location.href = back;
      } else if (history.length > 1) {
        history.back();
      } else {
        location.href = 'documents.html';
      }
    }
    backBtn.addEventListener('click', goBack);
    backBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      goBack();
    }, { passive: false });

    // Detect mobile
    var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    var frame = document.getElementById('pdf-frame');
    var mobilePrompt = document.getElementById('mobile-prompt');

    if (isMobile) {
      // Hide iframe, show mobile prompt
      frame.style.display = 'none';
      mobilePrompt.style.display = 'flex';

      // Set mobile content
      document.getElementById('mobile-heading').textContent = title;
      document.getElementById('mobile-page').textContent = page ? 'Page ' + page : '';

      // Open button launches PDF in system browser
      var openBtn = document.getElementById('open-btn');
      function openPdf() {
        window.open(pdfUrl, '_blank');
      }
      openBtn.addEventListener('click', openPdf);
      openBtn.addEventListener('touchend', function(e) {
        e.preventDefault();
        openPdf();
      }, { passive: false });

    } else {
      // Desktop: load PDF in iframe
      frame.src = pdfUrl;
    }
  </script>

</body>
</html>
