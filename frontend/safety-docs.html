<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0B2545" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Safety Docs" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Safety Docs Page Styles */
    .docs-page-header {
      background: var(--navy-900);
      color: #fff;
      padding: max(14px, env(safe-area-inset-top)) 0 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .docs-page-header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .docs-back-btn {
      width: 44px;
      height: 44px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .docs-back-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: #fff;
    }

    .docs-back-btn:focus-visible {
      outline: 3px solid var(--amber);
      outline-offset: 2px;
    }

    .docs-header-content {
      flex: 1;
    }

    .docs-header-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #fff;
    }

    .docs-page-body {
      background: #F1F5F9;
      color: var(--ink-900);
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0 env(safe-area-inset-left) env(safe-area-inset-bottom) env(safe-area-inset-right);
    }

    .docs-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .docs-search-wrap {
      margin-bottom: 28px;
    }

    .docs-search-box {
      position: relative;
      width: 100%;
    }

    .docs-search-input {
      width: 100%;
      height: 52px;
      padding: 0 16px 0 44px;
      font-size: 16px;
      color: var(--ink-900);
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .docs-search-input::placeholder {
      color: var(--ink-500);
    }

    .docs-search-input:focus-visible {
      border-color: var(--navy-700);
      box-shadow: 0 0 0 4px rgba(245, 183, 0, 0.35);
    }

    .docs-search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-500);
      font-size: 20px;
      line-height: 1;
      pointer-events: none;
    }

    .docs-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }

    .doc-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
      min-height: 160px;
      background: #fff;
      border: 2px solid transparent;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(11, 37, 69, 0.08);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s, border-color 0.15s;
    }

    .doc-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(11, 37, 69, 0.14);
      border-color: var(--navy-700);
    }

    .doc-card:focus-visible {
      outline: 4px solid var(--amber);
      outline-offset: 2px;
    }

    .doc-card.hidden {
      display: none;
    }

    .doc-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: rgba(245, 183, 0, 0.18);
      color: var(--amber-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .doc-title {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.1px;
      color: var(--ink-900);
    }

    .doc-desc {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: var(--ink-700);
      flex: 1;
    }

    /* Modal styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0 env(safe-area-inset-left) 0 env(safe-area-inset-right);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      background: #fff;
      border-radius: 20px 20px 0 0;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      animation: modalSlideUp 0.3s ease-out;
    }

    @keyframes modalSlideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-handle {
      height: 4px;
      width: 40px;
      background: var(--line);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      color: var(--ink-900);
      flex: 1;
    }

    .modal-close {
      width: 40px;
      height: 40px;
      border: 2px solid var(--line);
      border-radius: 10px;
      background: transparent;
      color: var(--ink-900);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: #F1F5F9;
      border-color: var(--navy-700);
    }

    .modal-close:focus-visible {
      outline: 3px solid var(--amber);
      outline-offset: 2px;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink-900);
    }

    .modal-body strong {
      color: var(--ink-900);
      font-weight: 700;
    }

    .modal-body p {
      margin: 0 0 16px;
    }

    .modal-body ul {
      margin: 0 0 16px;
      padding-left: 24px;
    }

    .modal-body li {
      margin-bottom: 8px;
    }

    .modal-body .doc-section {
      margin-bottom: 20px;
    }

    .modal-body .doc-section-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--navy-900);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 13px;
    }

    .modal-body .policy-card {
      background: #F1F5F9;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      border-left: 4px solid var(--amber);
    }

    .modal-body .contact-card {
      background: rgba(3, 105, 161, 0.06);
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 12px;
      border: 1px solid rgba(3, 105, 161, 0.15);
    }

    .contact-name {
      font-weight: 700;
      color: var(--navy-900);
      font-size: 15px;
      margin-bottom: 4px;
    }

    .contact-role {
      font-size: 13px;
      color: var(--ink-700);
      margin-bottom: 8px;
    }

    .contact-info {
      font-size: 14px;
      font-weight: 600;
      color: var(--info);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .contact-info a {
      color: var(--info);
      text-decoration: none;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }

    .modal-body .alert-box {
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .alert-box.info {
      background: #E0F2FE;
      color: #0C4A6E;
      border: 1px solid rgba(3, 105, 161, 0.2);
    }

    .alert-box.warning {
      background: #FEF3C7;
      color: #7A4A00;
      border: 1px solid rgba(181, 135, 0, 0.2);
    }

    .alert-box.danger {
      background: #FEE2E2;
      color: #7F1D1D;
      border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .modal-body .golden-rule {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .modal-body .golden-rule:last-child {
      border-bottom: none;
    }

    .gr-dot {
      width: 8px;
      height: 8px;
      background: var(--amber);
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .gr-name {
      font-weight: 700;
      color: var(--navy-900);
      font-size: 15px;
      margin-bottom: 4px;
    }

    .gr-desc {
      font-size: 14px;
      color: var(--ink-700);
      line-height: 1.5;
    }

    /* Empty state */
    .docs-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-700);
    }

    .docs-empty p {
      margin: 0;
      font-size: 16px;
    }

    @media (max-width: 480px) {
      .docs-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 14px;
      }

      .doc-card {
        padding: 16px;
        min-height: 140px;
      }

      .modal {
        border-radius: 16px 16px 0 0;
      }
    }
  </style>
  <title>Safety Documents — Bates Electric</title>
</head>
<body class="docs-page-body">
  <!-- Header -->
  <header class="docs-page-header">
    <div class="docs-page-header-inner">
      <button type="button" class="docs-back-btn" id="back-btn" onclick="goBack()">←</button>
      <div class="docs-header-content">
        <h1 class="docs-header-title">Safety Documents</h1>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="docs-main">
    <!-- Search -->
    <div class="docs-search-wrap">
      <div class="docs-search-box">
        <span class="docs-search-icon">🔍</span>
        <input
          type="text"
          class="docs-search-input"
          id="search-input"
          placeholder="Search documents..."
          aria-label="Search safety documents"
        />
      </div>
    </div>

    <!-- Grid of Documents -->
    <div class="docs-grid" id="docs-grid">
      <!-- Cards inserted by safety-docs.js -->
    </div>

    <!-- Empty State -->
    <div class="docs-empty" id="docs-empty" style="display: none;">
      <p>No documents match your search.</p>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="docModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button type="button" class="modal-close" onclick="closeModal()" aria-label="Close document">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="safety-docs.js"></script>
  <script src="shared-nav.js"></script>
</body>
</html>
