<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bates Electric" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <title>Bates Electric — Safety Data Sheets</title>
  <style>
    .sds-page {
      min-height: 100vh;
      background: var(--surface);
      padding-top: 80px;
      padding-bottom: 120px;
    }

    .sds-header {
      padding: 24px 20px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .sds-search {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      font-size: 16px;
      color: var(--ink-900);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 16px;
    }

    .sds-search:focus-visible {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(245, 183, 0, 0.2);
    }

    .sds-search::placeholder {
      color: var(--ink-500);
    }

    .sds-filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
      margin-bottom: 4px;
    }

    .sds-filter {
      flex-shrink: 0;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink-700);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .sds-filter:active {
      transform: scale(0.98);
    }

    .sds-filter.active {
      background: var(--amber);
      color: white;
      border-color: var(--amber);
    }

    .sds-main {
      padding: 0 20px 20px;
    }

    .sds-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sds-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .sds-card:active {
      background: #F9F9F9;
      border-color: var(--amber);
      box-shadow: 0 2px 8px rgba(245, 183, 0, 0.15);
    }

    .sds-signal {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .sds-signal.red {
      background: rgba(217, 48, 37, 0.12);
    }

    .sds-signal.orange {
      background: rgba(217, 119, 6, 0.12);
    }

    .sds-signal.yellow {
      background: rgba(234, 179, 8, 0.12);
    }

    .sds-signal.blue {
      background: rgba(3, 105, 161, 0.12);
    }

    .sds-signal.green {
      background: rgba(34, 197, 94, 0.12);
    }

    .sds-info {
      flex: 1;
      min-width: 0;
    }

    .sds-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink-900);
      margin-bottom: 4px;
      word-wrap: break-word;
    }

    .sds-brand {
      font-size: 13px;
      color: var(--ink-700);
      margin-bottom: 2px;
    }

    .sds-use {
      font-size: 12px;
      color: var(--ink-500);
    }

    .signal-badge {
      flex-shrink: 0;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .signal-badge.DANGER {
      background: rgba(217, 48, 37, 0.2);
      color: #A82F23;
    }

    .signal-badge.WARNING {
      background: rgba(217, 119, 6, 0.2);
      color: #A86C04;
    }

    .signal-badge.CAUTION {
      background: rgba(234, 179, 8, 0.2);
      color: #A48C04;
    }

    .signal-badge.NOTICE {
      background: rgba(3, 105, 161, 0.2);
      color: #0254A0;
    }

    .sds-chevron {
      flex-shrink: 0;
      color: var(--ink-500);
      width: 18px;
      height: 18px;
    }

    /* Modal Styles */
    .sds-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      animation: fadeIn 0.2s ease-out;
    }

    .sds-modal-overlay.open {
      display: block;
    }

    .sds-modal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 85vh;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s ease-out;
      max-width: 100%;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .sds-modal-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sds-modal-close {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--ink-700);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
    }

    .sds-modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink-900);
    }

    .sds-modal-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px;
    }

    .sds-modal-section {
      margin-bottom: 24px;
    }

    .sds-modal-section:last-child {
      margin-bottom: 0;
    }

    .sds-detail-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
      padding: 14px;
      background: #F9F9F9;
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    .sds-detail-icon {
      flex-shrink: 0;
      font-size: 32px;
    }

    .sds-detail-meta {
      flex: 1;
    }

    .sds-detail-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--ink-500);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .sds-detail-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink-900);
      margin-bottom: 2px;
    }

    .sds-detail-note {
      font-size: 12px;
      color: var(--ink-500);
    }

    .sds-detail-badge {
      text-align: right;
    }

    .sds-detail-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink-900);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sds-detail-title svg {
      flex-shrink: 0;
    }

    .hazard-tag {
      display: inline-block;
      padding: 8px 12px;
      margin-right: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      background: #D93025;
      border-radius: 8px;
    }

    .ppe-tag {
      display: inline-block;
      padding: 8px 12px;
      margin-right: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      background: #0369A1;
      border-radius: 8px;
    }

    .info-row {
      font-size: 14px;
      color: var(--ink-700);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .info-row strong {
      color: var(--ink-900);
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-500);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink-700);
      margin-bottom: 8px;
    }

    .empty-state-text {
      font-size: 14px;
      color: var(--ink-500);
    }

    @media (max-width: 480px) {
      .sds-page {
        padding-bottom: 100px;
      }

      .sds-card {
        padding: 14px 12px;
        gap: 12px;
      }

      .sds-signal {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }

      .sds-name {
        font-size: 14px;
      }

      .sds-brand {
        font-size: 12px;
      }

      .sds-use {
        font-size: 11px;
      }

      .signal-badge {
        font-size: 10px;
        padding: 5px 9px;
      }
    }
  </style>
</head>
<body class="hub-body">


  <main class="sds-page">
    <div class="sds-header">
      <input
        type="text"
        class="sds-search"
        id="sdsSearch"
        placeholder="Search by name, brand, or use..."
        autocomplete="off"
      />
      <div class="sds-filters">
        <button class="sds-filter active" onclick="setSDSFilter('all', this)">All</button>
        <button class="sds-filter" onclick="setSDSFilter('DANGER', this)">DANGER</button>
        <button class="sds-filter" onclick="setSDSFilter('WARNING', this)">WARNING</button>
        <button class="sds-filter" onclick="setSDSFilter('flammable', this)">Flammable</button>
      </div>
    </div>

    <div class="sds-main">
      <div class="sds-list" id="sdsList"></div>
    </div>
  </main>

  <!-- Modal -->
  <div class="sds-modal-overlay" id="sdsModalOverlay" onclick="closeSDS()"></div>
  <div class="sds-modal" id="sdsModal">
    <div class="sds-modal-header">
      <h2 class="sds-modal-title" id="modalTitle"></h2>
      <button class="sds-modal-close" onclick="closeSDS()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sds-modal-body" id="modalBody"></div>
  </div>

  <script src="sds.js"></script>
  <script src="shared-nav.js"></script>
</body>
</html>
