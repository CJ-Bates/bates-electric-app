<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bates Electric" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <title>Bates Electric — Reset Password</title>
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card glass-card" aria-labelledby="reset-title">
      <header class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img src="logo-icon.png" alt="Bates Electric" width="48" height="48" style="border-radius:10px;" />
        </div>
        <h1 id="reset-title">Reset Password</h1>
      </header>

      <form id="reset-form" class="auth-form" novalidate>
        <div class="field">
          <label for="reset-email">Email</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input id="reset-email" name="username" type="email" autocomplete="username" readonly />
          </div>
          <span class="field-hint">This is the account you're resetting.</span>
        </div>

        <div class="field">
          <label for="reset-new">New password</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="reset-new" name="new-password" type="password" autocomplete="new-password" minlength="8" required placeholder="Min. 8 characters" />
          </div>
        </div>

        <div class="field">
          <label for="reset-confirm">Confirm new password</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <input id="reset-confirm" name="new-password-confirm" type="password" autocomplete="new-password" minlength="8" required placeholder="Re-enter your password" />
          </div>
        </div>

        <button type="submit" class="btn-primary" id="reset-submit">
          <span class="btn-label">Update Password</span>
        </button>

        <div id="reset-status" class="status" role="status" aria-live="polite" hidden></div>

        <p style="margin-top:18px;text-align:center;font-size:14px;">
          <a href="index.html" class="forgot">Back to sign in</a>
        </p>
      </form>

      <footer class="legal">
        <p>Authorized personnel only. &copy; Bates Electric, Inc.</p>
      </footer>
    </section>
  </main>

  <script src="reset-password.js"></script>
</body>
</html>
