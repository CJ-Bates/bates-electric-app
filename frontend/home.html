<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bates Electric" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="hub-body">

  <!-- Animated gradient mesh background -->
  <div class="hub-aurora" aria-hidden="true">
    <span class="hub-blob hub-blob-1"></span>
    <span class="hub-blob hub-blob-2"></span>
    <span class="hub-blob hub-blob-3"></span>
  </div>

  <main class="hub-main">
    <!-- Hero greeting -->
    <section class="hub-hero" id="hub-hero">
      <div class="hub-hero-text">
        <div class="hub-hero-meta">
          <span class="hub-hero-eyebrow" id="hero-date">&nbsp;</span>
          <span class="hub-hero-weather" id="hero-weather" hidden role="button" tabindex="0">
            <span class="hub-hero-weather-icon" id="hero-weather-icon"></span>
            <span class="hub-hero-weather-temp" id="hero-weather-temp"></span>
            <span class="hub-hero-weather-loc" id="hero-weather-loc"></span>
          </span>
        </div>
        <h1 class="hub-hero-title">
          <span id="hero-greet">Welcome</span><span class="hub-hero-comma">,</span>
          <span class="hub-hero-name" id="hero-name">there</span>
        </h1>
        <p class="hub-hero-sub" id="hero-sub">Field Hub</p>
      </div>
      <div class="hub-hero-badge" id="hero-badge">
        <div class="hub-hero-badge-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div class="hub-hero-badge-text">
          <strong>Stay safe</strong>
          <span>Verify zero energy</span>
        </div>
      </div>
    </section>

    <!-- Search Bar -->
    <section class="dashboard-search" id="search-section">
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="search-input" type="search" id="dashboard-search" placeholder="Search inspections, docs, contacts...">
      </div>
    </section>

    <!-- Emergency Section -->
    <section id="emergency-section">
      <div class="emergency-banner" id="emergency-banner">
        <div class="emergency-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div>
          <div class="emergency-title">Emergency / Incident</div>
          <div class="emergency-sub">Tap for immediate response steps</div>
        </div>
        <div class="emergency-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>

      <div class="section-label">Quick call</div>
      <div class="emergency-calls-grid">
        <a href="tel:911" class="emergency-call-button emergency-call-911">
          <div class="call-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.77 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <div class="call-label">
            <div class="call-number">911</div>
            <div class="call-type">Emergency</div>
          </div>
        </a>
        <a href="tel:6364643939" class="emergency-call-button emergency-call-office">
          <div class="call-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.77 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <div class="call-label">
            <div class="call-number">Office</div>
            <div class="call-type">(636) 464-3939</div>
          </div>
        </a>
      </div>
    </section>

    <!-- Featured Actions -->
    <section id="featured-section">
      <div class="section-label">Job tools</div>
      <div class="featured-actions" id="featured-actions-grid">
        <!-- Populated by home.js based on role -->
      </div>
    </section>

    <!-- Quick Links Grid -->
    <section id="quick-links-section">
      <div class="section-label">Quick links</div>
      <div class="quick-grid" id="quick-links-grid">
        <!-- Populated by home.js -->
      </div>
    </section>

  </main>

  <script src="home.js"></script>
  <script src="shared-nav.js"></script>
</body>
</html>
