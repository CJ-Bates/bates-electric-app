<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bates Electric" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <title>Bates Electric</title>
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card glass-card" aria-labelledby="auth-title">
      <header class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <h1 id="auth-title">Bates Electric</h1>
      </header>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin" id="tab-signin">Sign In</button>
        <button class="auth-tab" data-tab="signup" id="tab-signup">Sign Up</button>
      </div>

      <!-- Sign In Form -->
      <form id="login-form" class="auth-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input id="email" name="email" type="email" autocomplete="username" inputmode="email" spellcheck="false" autocapitalize="off" required placeholder="you@bateselectric.com" />
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Enter your password" />
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="row-between">
          <label class="remember">
            <input type="checkbox" id="remember" name="remember" />
            <span>Keep me signed in</span>
          </label>
          <a href="#" class="forgot" id="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-label">Sign In</span>
        </button>

        <div id="status" class="status" role="status" aria-live="polite" hidden></div>
      </form>

      <!-- Sign Up Form -->
      <form id="signup-form" class="auth-form" novalidate hidden>
        <div class="field">
          <label for="signup-name">Full Name</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="signup-name" name="full_name" type="text" autocomplete="name" required placeholder="John Smith" />
          </div>
        </div>

        <div class="field">
          <label for="signup-phone">Phone Number</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-5.86-5.86A19.79 19.79 0 0 1 2.26 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <input id="signup-phone" name="phone" type="tel" autocomplete="tel" inputmode="tel" required placeholder="(636) 555-1234" />
          </div>
        </div>

        <div class="field">
          <label for="signup-email">Email</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input id="signup-email" name="email" type="email" autocomplete="email" inputmode="email" spellcheck="false" autocapitalize="off" required placeholder="you@bateselectric.com" />
          </div>
          <span class="field-hint">Use your @bates-electric.com or .bateselectric@gmail.com address</span>
        </div>

        <div class="field">
          <label for="signup-password">Password</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="signup-password" name="password" type="password" autocomplete="new-password" required placeholder="Min. 8 characters" minlength="8" />
          </div>
        </div>

        <div class="field">
          <label for="signup-confirm">Confirm Password</label>
          <div class="input-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <input id="signup-confirm" name="confirm_password" type="password" autocomplete="new-password" required placeholder="Re-enter your password" />
          </div>
        </div>

        <button type="submit" class="btn-primary" id="signup-btn">
          <span class="btn-label">Create Account</span>
        </button>

        <div id="signup-status" class="status" role="status" aria-live="polite" hidden></div>
      </form>

      <footer class="legal">
        <p>Authorized personnel only. &copy; Bates Electric, Inc.</p>
      </footer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
